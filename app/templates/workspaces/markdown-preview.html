<section class="workspace {{ 'active' if active_tool == 'markdown-preview' else '' }}" data-workspace="markdown-preview">
      <header class="workspace-header">
        <button class="sidebar-toggle" data-sidebar-toggle><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg></button>
        <div class="workspace-title">
          <span class="eyebrow">Markup</span>
          <h2>Markdown Preview</h2>
        </div>
        <span class="workspace-chip">Live HTML render</span>
      </header>

      <div class="md-editor-layout">
        <!-- LEFT: Editor pane -->
        <form class="md-editor-pane" data-async-form data-target="#markdown-preview-result" action="/tools/markdown-preview" method="post">
          <input type="hidden" name="translate_to" id="markdown-translate-to" value="">
          <div class="md-pane-header">
            <div class="md-pane-label">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px">
                <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
              Editor
            </div>
            <span class="md-counter" id="md-word-count">0 từ · 0 ký tự</span>
          </div>
          <textarea id="markdown-text" name="text" class="md-editor-textarea" placeholder="# Tiêu đề 1&#10;**In đậm**, *in nghiêng*, `code`&#10;&#10;- Gạch đầu dòng 1&#10;- Gạch đầu dòng 2&#10;&#10;&gt; Trích dẫn&#10;&#10;```python&#10;print('Hello, World!')&#10;```&#10;&#10;| Cột A | Cột B |&#10;|-------|-------|&#10;| 1     | 2     |" required></textarea>
          <div class="md-pane-footer">
            <button class="btn btn-primary" type="submit">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:14px;height:14px">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
              Preview
            </button>
            <button class="btn btn-secondary" type="button" id="md-clear-btn" title="Xoá nội dung">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/>
              </svg>
              Xoá
            </button>
          </div>
        </form>

        <div class="resizer-handle" data-resizer></div>

        <!-- RIGHT: Preview pane -->
        <div class="md-preview-pane">
          <div class="md-pane-header">
            <div class="md-pane-label">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              Preview
            </div>
            <div style="display: flex; gap: 6px; flex-wrap: wrap; align-items: center;">
              <div class="md-translate-wrapper" style="display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px; background: var(--bg2); font-size: 11px; font-weight: 600; color: var(--text2); cursor: pointer;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:12px;height:12px;opacity:0.7;">
                  <path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/>
                </svg>
                <span>Dịch:</span>
                <select id="md-translate-select" style="font-size: 11px; font-weight: 600; border: none; padding: 0 4px; background: transparent; color: var(--text); cursor: pointer; outline: none; height: auto; width: auto; font-family: inherit;">
                  <option value="">Gốc</option>
                  <option value="vi">Tiếng Việt</option>
                  <option value="en">Tiếng Anh</option>
                  <option value="zh-CN">Tiếng Trung</option>
                  <option value="ja">Tiếng Nhật</option>
                  <option value="ko">Tiếng Hàn</option>
                  <option value="fr">Tiếng Pháp</option>
                  <option value="de">Tiếng Đức</option>
                </select>
              </div>
              <button class="md-copy-btn" id="md-copy-html-btn" type="button" title="Sao chép HTML">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:13px;height:13px">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                Copy HTML
              </button>
              <button class="md-copy-btn" id="md-copy-gdocs-btn" type="button" title="Sao chép định dạng cho Google Docs">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:13px;height:13px;color:var(--b2)">
                  <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                  <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                </svg>
                Copy cho Google Docs
              </button>
              <button class="md-copy-btn" id="md-download-docx-btn" type="button" title="Tải tài liệu Word (.docx) cho Google Docs">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:13px;height:13px;color:var(--b2)">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="7 10 12 15 17 10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Tải Word (.docx)
              </button>
            </div>
          </div>
          <div id="markdown-preview-result" class="md-preview-scroll">
            <div class="result-empty">
              <div class="result-empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg></div>
              <h4>Preview xuất hiện ở đây</h4>
              <p>Nhập Markdown vào editor bên trái, sau đó nhấn <strong>Preview</strong>.</p>
            </div>
          </div>
        </div>
      </div>
    </section>
