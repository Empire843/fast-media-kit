<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Quick Media Tools — personal creator utilities for video download, XLSX translation, background removal and more." />
    <meta name="theme-color" content="#080b11" />
    <title>Quick Media Tools</title>
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}?v=8" />
  </head>
  <body>
    {% block body %}{% endblock %}
    <script src="{{ url_for('static', path='app.js') }}?v=7"></script>
  </body>
</html>
