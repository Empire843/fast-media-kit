<section class="workspace {{ 'active' if active_tool == 'background' else '' }}" data-workspace="background">
      <header class="workspace-header">
        <button class="sidebar-toggle" data-sidebar-toggle><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg></button>
        <div class="workspace-title">
          <span class="eyebrow">rembg</span>
          <h2>Remove background</h2>
        </div>
        <span class="workspace-chip">Batch processing · Offline AI</span>
      </header>
      <div class="split-view">
        <div class="form-panel">
          <form class="form-stack" id="bg-remove-form" action="/tools/remove-background"
            method="post" enctype="multipart/form-data">
            
            <div class="drop-zone" data-drop-zone="images">
              <div class="drop-zone-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                  <circle cx="8.5" cy="8.5" r="1.5" />
                  <polyline points="21 15 16 10 5 21" />
                </svg></div>
              <div class="drop-zone-text">Drop <strong>multiple images</strong> or click to browse</div>
              <input name="images" id="bg-images-input" type="file" accept="image/*" multiple required />
            </div>
            
            <div id="bg-selected-list" class="sheet-list-empty" style="max-height: 150px; overflow-y: auto;">
              No images selected.
            </div>
 
            <div class="form-row">
              <div class="form-group">
                <label for="sel-bg-model">AI Model</label>
                <select id="sel-bg-model" name="model">
                  {% for m in background_models %}
                    <option value="{{ m }}" {{ 'selected' if m == 'isnet-general-use' else '' }}>{{ m }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="form-group" style="justify-content: end;">
                <label class="check-row" style="height: 40px; margin-bottom: 0;">
                  <input name="alpha_matting" type="checkbox" value="true" />
                  <span>Alpha matting (Fine edges)</span>
                </label>
              </div>
            </div>
 
            <div class="btn-row">
              <button class="btn btn-primary" type="submit" id="bg-submit-btn">Remove background</button>
            </div>
          </form>
        </div>
        <div class="resizer-handle" data-resizer></div>
        <div class="result-panel">
          <div id="background-result" class="result-zone">
            <div class="result-empty">
              <div class="result-empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                  <circle cx="8.5" cy="8.5" r="1.5" />
                  <polyline points="21 15 16 10 5 21" />
                </svg></div>
              <h4>Ready to process</h4>
              <p>Upload images — background-removed results appear here in real-time.</p>
            </div>
          </div>
        </div>
      </div>
    </section>
